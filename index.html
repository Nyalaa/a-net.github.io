<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta property="og:description" content="معالجة المشاكل التي تخص مواقع التواصل الاجتماعي وإنشاء المواقع الإلكترونية">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البحير نت - مطور</title>

    <style>
        /* --- شاشة الترحيب --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0f172a 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out, visibility 1s;
        }

        .ai-loader {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- تنسيق الخلفية والألوان الجديدة --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); /* خلفية الموقع */
            color: #ffffff;
            min-height: 100vh;
        }

        .contact-container {
            background: rgba(255, 255, 255, 0.05); /* خلفية القسم شفافة */
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 550px;
            text-align: center;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* تنسيق الأقسام بألوان مختلفة */
        .section-info {
            background: rgba(59, 130, 246, 0.1); /* لون أزرق خفيف */
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .section-form {
            background: rgba(0, 0, 0, 0.2); /* لون أغمق للنموذج */
            padding: 20px;
            border-radius: 15px;
        }

        #clock-container {
            background: #ffffff;
            padding: 15px;
            border-radius: 15px;
            margin: 15px auto;
            color: #000;
        }

        #date { color: #475569; font-size: 1rem; }
        #time { color: #2563eb; font-size: 1.8rem; font-weight: bold; }

        .header-image {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        h6 { color: #93c5fd; line-height: 1.6; }
        p { color: #cbd5e1; font-size: 1.1rem; }

        /* تنسيق المدخلات */
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #1e293b;
            color: white;
            box-sizing: border-box;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #1d4ed8; transform: scale(1.02); }

        /* حذف الخط من الرابط */
        .fb-link {
            text-decoration: none !important; 
            color: #60a5fa;
            font-weight: bold;
        }

        #main-content { display: none; }
    </style>
</head>

<body>

    <div id="splash-screen">
        <div class="ai-loader"></div>
        <h2 style="color: white; margin-top: 20px;">مرحباً بكم في موقع البحير نت</h2>
    </div>

    <div id="main-content">
        <div class="contact-container">
            
            <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80" class="header-image">

            <div id="clock-container">
                <div id="date">جاري التحميل...</div>
                <div id="time">00:00:00</div>
            </div>

            <div class="section-info">
                <p>يوفر موقع البحير نت حلول تقنية كاملة في مجال التكنولوجيا ومواقع التواصل الاجتماعية واستشارات البرمجة والأمن المعلوماتي.</p>
                <h6>تصميم المبرمج محمود عصام - IT كلية نيالا التقانية</h6>
                <a href="https://www.facebook.com/profile.php?id=100077831043049" target="_blank" class="fb-link">لمتابعة مبرمج الموقع علي فيسبوك</a>
            </div>

            <div class="section-form">
                <form action="https://formsubmit.co/fastfyks@gmail.com" method="post">
                    <input type="hidden" name="_captcha" value="false">
                    
                    <input type="text" name="الاسم" placeholder="الاسم الكامل" required>
                    
                    <select name="المشكلة" required>
                        <option value="" disabled selected>اختار نوع تواصلك</option>
                        <option value="فتح حساب تيك توك">فتح حساب تيك توك</option>
                        <option value="فتح حساب تيلجرام">فتح حساب تيلجرام</option>
                        <option value="برمجة شبكات الواي فاي">برمجة شبكات الواي فاي</option>
                        <option value="استضافة لموقع إلكتروني">استضافة لموقع إلكتروني</option>
                        <option value="تم قفل حسابي علي فيسبوك">تم قفل حسابي علي فيسبوك</option>
                        <option value="تأمين حسابات التواصل">تأمين حسابات التواصل</option>
                        <option value="شراكة تقنية">انا تقني وأريد شراكة معك</option>
                        <option value="فتح حساب واتساب">فتح حساب واتساب</option>
                        <option value="امرا اخر">امراً آخر</option>
                    </select>

                    <textarea name="الرسالة" rows="4" placeholder="اكتب رسالتك مع رقم هاتفك..." required></textarea>

                    <label style="font-size: 0.9rem;">تقييمك لخدماتنا:</label>
                    <select name="التقييم" required>
                        <option value="ممتاز">ممتاز جداً</option>
                        <option value="جيد">راضي</option>
                        <option value="ضعيف">غير راضي</option>
                    </select>

                    <button type="submit">إرسال البيانات الآن</button>
                </form>
            </div>

            <a href="#" style="color: #94a3b8; text-decoration: none; font-size: 0.8rem; display: block; margin-top: 20px;">الرجوع للأعلى</a>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('ar-EG', dateOptions);
            document.getElementById('time').textContent = now.toLocaleTimeString('ar-EG');
        }
        setInterval(updateClock, 1000);
        updateClock();

        window.onload = function() {
            setTimeout(function() {
                document.getElementById('splash-screen').style.opacity = '0';
                document.getElementById('splash-screen').style.visibility = 'hidden';
                document.getElementById('main-content').style.display = 'block';
            }, 5000);
        };
    </script>
</body>
</html>
