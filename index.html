<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta property="og:description" content="معالجة المشاكل التي تخص مواقع التواصل الاجتماعي وإنشاء المواقع الإلكترونية">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البحير نت</title>

    <style>
        /* --- شاشة الترحيب --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a192f 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s, visibility 1s;
        }
        .ai-loader {
            width: 80px; height: 80px; border: 4px solid transparent;
            border-top-color: #64ffda; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- التنسيقات العامة --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: #0a192f; /* خلفية الموقع الأساسية */
            color: #ccd6f6;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .contact-container {
            background: #112240; /* لون الحاوية الرئيسية */
            width: 95%; max-width: 600px;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin: 20px;
        }

        /* --- تنسيق الأقسام بألوان مختلفة --- */
        .section-header {
            background: #1d3557; /* لون قسم الهيدر */
            padding: 30px; text-align: center;
        }
        .section-info {
            background: #112240; /* لون قسم المعلومات */
            padding: 25px; border-top: 2px solid #64ffda;
        }
        .section-form {
            background: #1b263b; /* لون قسم النموذج */
            padding: 30px; border-top: 2px solid #e63946;
        }

        .header-image {
            width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px;
        }

        #clock-container {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px;
            margin: 15px auto; border: 1px solid #64ffda;
        }
        #date { color: #8892b0; font-size: 0.9rem; }
        #time { color: #64ffda; font-size: 1.8rem; font-weight: bold; }

        p { line-height: 1.6; color: #a8b2d1; font-size: 1.1rem; }
        h6 { color: #64ffda; margin-top: 10px; font-weight: normal; }

        /* --- تنسيق المدخلات --- */
        .form-group { margin-bottom: 20px; }
        input, select, textarea {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #233554;
            background: #0a192f; color: white; font-size: 1rem; box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #64ffda; outline: none; box-shadow: 0 0 10px rgba(100, 255, 218, 0.2);
        }

        button {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            background: #64ffda; color: #0a192f; font-weight: bold;
            font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #52d1b2; transform: translateY(-3px); }

        /* حذف الخط من الرابط */
        .fb-link {
            text-decoration: none; color: #64ffda; font-weight: bold; transition: 0.3s;
        }
        .fb-link:hover { color: #fff; }

        #main-content { display: none; }
    </style>
</head>

<body>

    <div id="splash-screen">
        <div class="ai-loader"></div>
        <div style="color: #64ffda; margin-top: 20px; font-size: 1.5rem;">مرحب بكم في موقع البحير نت</div>
    </div>

    <div id="main-content">
        <div class="contact-container">
            
            <div class="section-header">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80" class="header-image">
                <div id="clock-container">
                    <div id="date">جاري التحميل...</div>
                    <div id="time">00:00:00</div>
                </div>
            </div>

            <div class="section-info">
                <p>
                    يوفر موقع البحير نت حلول تقنية كاملة في مجال التكنولوجيا ومواقع التواصل الاجتماعية، 
                    كما يوفر لك الموقع استشارات واجوبة فيما يتعلق بمجال البرمجة وأمن المعلومات.
                </p>
                <h6>تصميم المبرمج: محمود عصام</h6>
                <div style="margin-top: 15px;">
                    <a href="https://www.facebook.com/profile.php?id=100077831043049" class="fb-link" target="_blank">
                        لمتابعة مبرمج الموقع علي فيسبوك
                    </a>
                </div>
            </div>

            <div class="section-form">
                <form action="https://formsubmit.co/fastfyks@gmail.com" method="post">
                    <input type="hidden" name="_captcha" value="false">
                    
                    <div class="form-group">
                        <input type="text" name="الاسم الكامل" placeholder="الاسم الكامل" required>
                    </div>

                    <div class="form-group">
                        <select name="نوع التواصل" required>
                            <option value="" disabled selected>اختار نوع تواصلك</option>
                            <option value="فتح حساب تيك توك">فتح حساب تيك توك</option>
                            <option value="فتح حساب تيلجرام">فتح حساب تيلجرام</option>
                            <option value="برمجة شبكات الواي فاي">برمجة شبكات الواي فاي</option>
                            <option value="استضافة لموقع إلكتروني">استضافة لموقع إلكتروني</option>
                            <option value="تأمين حسابات التواصل">تأمين حسابات التواصل الاجتماعي</option>
                            <option value="أمر آخر">أمراً آخر</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <textarea name="الرسالة" rows="4" placeholder="اكتب رسالتك وتتضمن رقم هاتفك..." required></textarea>
                    </div>

                    <button type="submit">إرسال البيانات</button>
                </form>
            </div>

        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('ar-EG', dateOptions);
            document.getElementById('time').textContent = now.toLocaleTimeString('ar-EG');
        }
        setInterval(updateClock, 1000);
        updateClock();

        window.onload = function() {
            setTimeout(function() {
                document.getElementById('splash-screen').style.opacity = '0';
                document.getElementById('splash-screen').style.visibility = 'hidden';
                document.getElementById('main-content').style.display = 'block';
            }, 5000);
        };
    </script>

</body>
</html>
