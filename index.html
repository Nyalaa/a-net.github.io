<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta property="og:description" content="معالجة المشاكل التي تخص مواقع التواصل الاجتماعي وإنشاء المواقع الإلكترونية">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البحير نت</title>

    <style>
        /* --- تأثيرات شاشة الترحيب المعدلة --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            display: flex; 
            flex-direction: column; 
            justify-content: center; /* توسيط عمودي */
            align-items: center;     /* توسيط أفقي */
            z-index: 9999; 
            transition: opacity 1s ease-out, visibility 1s;
            color: #ffffff !important; 
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px;
            box-sizing: border-box;
        }

        .ai-loader {
            width: 70px; /* تصغير حجم اللودر قليلاً */
            height: 70px; 
            border: 3px solid transparent;
            border-top-color: #0055d4; border-radius: 50%;
            animation: spin 1.5s linear infinite; position: relative; margin-bottom: 25px;
        }

        .ai-loader::before {
            content: ""; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 3px solid transparent; border-top-color: #ff0606; border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* تعديل حجم النص ومكانه */
        .welcome-msg { 
            font-size: 1.2rem; /* تصغير حجم الخط كما طلبت */
            text-shadow: 0 0 10px rgba(0, 85, 212, 0.5); 
            margin: 10px 0; 
            display: none; 
            color: #ffffff !important; 
            max-width: 80%; /* لضمان عدم تمدد النص بشكل عرضي كبير */
            line-height: 1.5;
        }
        
        #welcome-msg-1 { display: block; animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.98); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- التنسيقات الأساسية للموقع --- */
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0; padding: 0; color: #000000; 
            background-color: #f0f2f5;
        }

        .contact-container {
            background: #ffffff; padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 90%;
            max-width: 550px; text-align: center; margin: 20px auto 40px auto;
        }

        #clock-container { background-color: #f8f8f8; padding: 15px; border-radius: 10px; margin: 20px auto; width: fit-content; }
        #time { color: #0055d4 !important; font-size: 1.8rem; font-weight: bold; }

        .form-group { margin-bottom: 15px; }
        textarea, input, select { width: 95%; padding: 12px; border: 2px solid #ccc; border-radius: 10px; outline: none; }

        button {
            background-color: rgb(0, 116, 231); color: white !important;
            border: none; padding: 15px; border-radius: 10px;
            font-weight: bold; cursor: pointer; width: 85%;
        }

        #main-content { display: none; width: 100%; }

        /* صفحة النجاح الثابتة */
        #success-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f0f2f5;
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #0055d4;
            font-weight: bold;
            text-decoration: none; /* إزالة الخط */
            border: 2px solid #0055d4;
            padding: 10px 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div id="splash-screen">
        <div class="ai-loader"></div>
        <div id="welcome-msg-1" class="welcome-msg">مرحباً بكم في موقع البحير نت <br> عالم التكنولوجيا والذكاء الاصطناعي</div>
        <div id="welcome-msg-2" class="welcome-msg">نسعى دائماً لتقديم الأفضل لكم في عالم البرمجة</div>
        <div id="thanks-msg" class="welcome-msg">شكراً لصبرك أيها الزائر</div>
    </div>

    <div id="success-page">
        <div class="contact-container">
            <h2 style="color: #28a745 !important;">✅ تم إرسال رسالتك بنجاح</h2>
            <p>شكراً لتواصلك معنا، مبرمج الموقع محمود عصام سيقوم بالرد عليك قريباً.</p>
            <a href="javascript:void(0)" onclick="location.reload()" class="back-link">إن كنت تريد الرجوع إلي الموقع اضغط هنا</a>
        </div>
    </div>

    <div id="main-content">
        <div class="contact-container">
            <div id="clock-container">
                <div id="date">جاري التحميل...</div>
                <div id="time">00:00:00</div>
            </div>

            <form id="contact-form">
                <input type="hidden" name="_captcha" value="false">
                <div class="form-group">
                    <input type="text" name="الاسم الكامل" placeholder="ادخل الاسم الكامل" required>
                </div>
                <div class="form-group">
                    <textarea name="الرسالة" rows="4" placeholder="اكتب رسالتك..." required></textarea>
                </div>
                <button type="submit" id="submit-button">إرسال البيانات</button>
            </form>
        </div>
    </div>

    <script>
        // ساعة وتاريخ
        function updateClock() {
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('ar-EG', dateOptions);
            document.getElementById('time').textContent = now.toLocaleTimeString('ar-EG');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // شاشة الترحيب
        window.onload = function() {
            const m1 = document.getElementById('welcome-msg-1');
            const m2 = document.getElementById('welcome-msg-2');
            const m3 = document.getElementById('thanks-msg');
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');

            setTimeout(() => { m1.style.display = 'none'; m2.style.display = 'block'; }, 3000);
            setTimeout(() => { m2.style.display = 'none'; m3.style.display = 'block'; }, 5500);
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => { splash.style.display = 'none'; main.style.display = 'block'; }, 1000);
            }, 8000);
        };

        // الإرسال
        const contactForm = document.getElementById('contact-form');
        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('submit-button').innerText = "جاري الإرسال...";
            
            const formData = new FormData(contactForm);
            fetch("https://formsubmit.co/ajax/fastfyks@gmail.com", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                if (response.ok) {
                    document.getElementById('main-content').style.display = 'none';
                    document.getElementById('success-page').style.display = 'flex';
                }
            });
        });
    </script>
</body>
</html>
