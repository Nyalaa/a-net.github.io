<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta property="og:description" content="معالجة المشاكل التي تخص مواقع التواصل الاجتماعي وإنشاء المواقع الإلكترونية">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البحير نت</title>

    <style>
        /* --- شاشة الترحيب --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001a33 0%, #000000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease-out, visibility 1s;
            color: #ffffff !important; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .ai-loader {
            width: 80px; height: 80px; border: 3px solid transparent;
            border-top-color: #0055d4; border-radius: 50%;
            animation: spin 1.5s linear infinite; position: relative; margin-bottom: 20px;
        }

        .ai-loader::before {
            content: ""; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 3px solid transparent; border-top-color: #00a2ff; border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .welcome-msg { font-size: 1.2rem; text-shadow: 0 0 15px #0055d4; display: none; margin: 10px 0; }
        #welcome-msg-1 { display: block; animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }

        /* --- التصميم العام للموقع --- */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #e6f0ff; color: #000; }
        .contact-container {
            background: #ffffff; padding: 30px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 85, 212, 0.15);
            width: 90%; max-width: 550px; text-align: center; margin: 20px auto;
        }

        /* --- نافذة الذكاء الاصطناعي (في المنتصف) --- */
        #ai-embedded-chat {
            background: #f8fbff; border: 2px solid #0055d4; border-radius: 15px;
            margin: 20px 0; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .ai-header { background: #0055d4; color: white; padding: 10px; font-weight: bold; }
        #chat-body { height: 200px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; text-align: right; }
        .ai-msg { background: #e1ecf7; padding: 8px; border-radius: 8px; align-self: flex-start; font-size: 0.9rem; border: 1px solid #d0e0f0; }
        .user-msg { background: #0055d4; color: white; padding: 8px; border-radius: 8px; align-self: flex-end; font-size: 0.9rem; }
        #ai-input { width: 100%; border: none; padding: 12px; box-sizing: border-box; outline: none; border-top: 1px solid #eee; }

        /* --- الساعة والأزرار --- */
        #clock-container { background: #f0f7ff; padding: 15px; border-radius: 10px; margin: 15px auto; border: 1px solid #cce0ff; width: fit-content; }
        #time { color: #0055d4; font-size: 1.8rem; font-weight: bold; }
        .fb-link { display: block; padding: 10px; background: #f0f7ff; color: #0055d4; text-decoration: none; border-radius: 50px; border: 1px solid #0055d4; margin: 5px auto; font-weight: bold; width: 80%; }
        button { background-color: #0055d4; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 90%; transition: 0.3s; }
        button:hover { background-color: #0041a3; }
        input, select, textarea { width: 95%; padding: 12px; margin: 10px 0; border: 2px solid #a3c2f0; border-radius: 10px; outline: none; }
        
        #main-content { display: none; }
    </style>
</head>

<body>

    <div id="splash-screen">
        <div class="ai-loader"></div>
        <div id="welcome-msg-1" class="welcome-msg">مرحباً بكم في البحير نت</div>
        <div id="welcome-msg-2" class="welcome-msg">عالم التكنولوجيا بواسطة محمود عصام</div>
        <img src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e?auto=format&fit=crop&w=600&q=80" id="success-img" style="width:200px; border-radius:15px; margin-top:15px; display:none;">
    </div>

    <div id="main-content">
        <div class="contact-container">
            <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80" style="width:100%; border-radius:15px; margin-bottom:15px;" alt="Technology">

            <div id="clock-container">
                <div id="date">جاري التحميل...</div>
                <div id="time">00:00:00</div>
            </div>

            <p>حلول تقنية متكاملة لمشاكل التواصل الاجتماعي والبرمجة.</p>
            <h6 style="font-weight: bold;">تصميم وبرمجة: المبرمج محمود عصام</h6>
            
            <a href="https://www.facebook.com/profile.php?id=100077831043049" target="_blank" class="fb-link">المبرمج على فيسبوك 🌐</a>
            <a href="https://www.facebook.com/profile.php?id=61573366409779" target="_blank" class="fb-link">صفحة البحير نت 🌐</a>

            <div id="ai-embedded-chat">
                <div class="ai-header">مساعد البحير الذكي 🤖</div>
                <div id="chat-body">
                    <div class="ai-msg">أهلاً بك! أنا المساعد الذكي الخاص بمحمود عصام. اسألني عن أي خدمة!</div>
                </div>
                <input type="text" id="ai-input" placeholder="اكتب سؤالك هنا واضغط Enter...">
            </div>

            <form action="https://formsubmit.co/fastfyks@gmail.com" method="post">
                <input type="hidden" name="_next" id="next-url" value="">
                <input type="text" name="الاسم الكامل" placeholder="الاسم الكامل" required>
                <select name="المشكلة" required>
                    <option value="" disabled selected>اختار نوع تواصلك</option>
                    <option value="فتح حساب">فتح حساب أو كاش</option>
                    <option value="تأمين">تأمين حساب فيسبوك</option>
                    <option value="شبكات">برمجة شبكات واي فاي</option>
                </select>
                <textarea name="الرسالة" rows="4" placeholder="اكتب تفاصيل طلبك هنا..." required></textarea>
                <button type="submit">إرسال البيانات</button>
            </form>
        </div>
    </div>

    <script>
        // تحديث الساعة
        function updateClock() {
            const now = new Date();
            document.getElementById('date').textContent = now.toLocaleDateString('ar-EG', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
            document.getElementById('time').textContent = now.toLocaleTimeString('ar-EG');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // منطق الذكاء الاصطناعي
        const aiInput = document.getElementById('ai-input');
        const chatBody = document.getElementById('chat-body');

        aiInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                const userText = this.value;
                addMsg(userText, 'user-msg');
                this.value = "";
                
                setTimeout(() => {
                    let res = "عذراً، تواصل مع محمود عصام لمزيد من التفاصيل.";
                    const input = userText.toLowerCase();
                    if(input.includes("من") || input.includes("برمج") || input.includes("صمم")) res = "تم تصميمي وبرمجتي بواسطة المبدع محمود عصام.";
                    if(input.includes("فيسبوك") || input.includes("حساب")) res = "محمود عصام خبير في استرجاع وتأمين حسابات الفيسبوك.";
                    if(input.includes("واي فاي") || input.includes("شبكة")) res = "نحن نوفر أفضل خدمات برمجة الشبكات في البحير نت.";
                    addMsg(res, 'ai-msg');
                }, 700);
            }
        });

        function addMsg(text, cls) {
            const div = document.createElement('div');
            div.className = cls;
            div.textContent = text;
            chatBody.appendChild(div);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // شاشة الترحيب
        window.onload = function() {
            document.getElementById('next-url').value = window.location.href + "?status=success";
            setTimeout(() => { 
                document.getElementById('welcome-msg-1').style.display = 'none';
                document.getElementById('welcome-msg-2').style.display = 'block';
                document.getElementById('success-img').style.display = 'block';
            }, 3000);
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                }, 1000);
            }, 6000);
        };
    </script>
</body>
</html>
